name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install JS deps (root)
        run: bun install --frozen-lockfile

      - name: Install JS deps (sidecar)
        run: cd sidecar && bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Frontend tests (Vitest)
        run: bun run test

      - name: Sidecar tests (Bun)
        run: cd sidecar && bun test

      - name: Rust tests (lib)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Compile sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: cd sidecar && bun run build:win-x64

      - name: Compile sidecar binary (macOS arm64)
        if: matrix.platform == 'macos-latest'
        run: cd sidecar && bun run build:mac-arm64

      - name: Compile sidecar binary (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: cd sidecar && bun run build:linux-x64

      - name: Build Tauri app
        run: bun run tauri build
