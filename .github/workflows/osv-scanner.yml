name: OSV-Scanner

# Google's open-source vuln scanner. Runs against package-lock.json, bun.lockb,
# Cargo.lock — finds CVEs in transitive deps that bun audit / cargo audit may
# miss. Free, no signup. Results are uploaded as SARIF and appear in the
# Security tab next to the CodeQL findings.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=results.sarif
            ./

      - name: Upload SARIF to Security tab
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: results.sarif
